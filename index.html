<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Escola</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
  <div class="cabecalho-itens">
    
    <div class="cabecalho-imagem">
      <img src="img/logo.png" alt="Logo">
    </div>

    <div class="titulo_site">
      <h1>Minha Escola</h1>
    </div>

  </div>
</header>


<section class="estudante">
  <h2 class="estudante_titulo">Estudantes</h2>

  <div class="estudantes_todos">

    <div>
      <img class="estudante-imagem" src="img/aluno1.png" alt="Aluno 1">
      <p class="estudante-nome">Aluno 1</p>
    </div>

    <div>
      <img class="estudante-imagem" src="img/aluno2.png" alt="Aluno 2">
      <p class="estudante-nome">Aluno 2</p>
    </div>

  </div>
</section>


<section class="escola">
  <h2 class="escola-titulo">Sobre a Escola</h2>
  <p>Coloque aqui um texto sobre a escola.</p>
</section>

</body>
</html>
