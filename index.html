<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Metadados e links externos -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Escola</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Cabeçalho do site -->
    <header class="cabecalho-itens">
        <img class="cabecalho-imagem" src="logo_nossa_escola.png" alt="Logo da página">

        <h1 class="titulo-site">Nossa Escola</h1>

        <div class="sociais">
            <img class="sociais" src="whatsapp.png" alt="Logo do WhatsApp da escola">
            <img class="sociais" src="facebook.png" alt="Facebook">
            <img class="sociais" src="instagram.png" alt="Instagram">
        </div>
    </header>

    <!-- Banner -->
    <section class="banner">
        <img class="escola-imagem" src="paragrafo_1_banner.jpg" alt="Banner escola">
    </section>

    <!-- Seção de estudantes -->
    <section class="estudante">
        <h1 class="estudante-titulo">Alunos em destaque</h1>

        <div class="estudantes-todos">
            <div class="estudante-div">
                <img class="estudante-imagem" src="estudante_menina.png" alt="Foto da turma do 1CDS do ano de 2023">

                <h3 class="estudante-nome">Aluno 1</h3>

                <a href="http://curso.alura.com.br/dashboard">
                    <p></p>
                </a>

                <img class="estudante-icone" src="whatsapp.png">
                <img class="estudante-icone" src="instagram.png">
                <img class="estudante-icone" src="facebook.png">
            </div>
        </div>
    </section>

</body>
</html>
